<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Dody ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

<!-- ⭐ النجوم -->
<div id="stars"></div>

<!-- شاشة البداية -->

<section id="loading-screen">

    <h2 id="loading-text"></h2>

</section>

<!-- الصفحة الرئيسية -->

<section id="main-page" class="hidden">

    <div class="glass-card">

        <h3 class="small-title">
            A Special Gift For...
        </h3>

        <h1>
            Happy Birthday
        </h1>

        <h1 class="name">
            Dody ❤️
        </h1>

        <p class="subtitle">
            My Love
        </p>

        <!-- الهدية -->

        <div id="gift-box">

            🎁

        </div>

        <button id="openBtn">

            Open Your Gift

        </button>

    </div>

</section>

<!-- الرسالة -->

<section id="message-page" class="hidden">

    <div class="message-card">

        <h1>
            Happy Birthday ❤️
        </h1>

        <div id="typewriter"></div>

        <button id="wishBtn">

            🎂 Make a Wish

        </button>

    </div>

</section>

<!-- النهاية -->

<section id="final-page" class="hidden">

    <div class="final-card">

        <h1>

            Every love story is beautiful...

        </h1>

        <h2>

            But ours is my favorite. ❤️

        </h2>

        <p>

            Made with endless love by Zeinab

        </p>

    </div>

</section>



<!-- مؤثرات -->

<div id="hearts-container"></div>

<div id="confetti-container"></div>

<script src="script.js"></script>

    <audio id="music" src="https://server11.mp3quran.net/download/soundhelix/birthday1.mp3" preload="auto"></audio>

</body>
</html>
